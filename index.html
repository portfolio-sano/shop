<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>TORINO(トリノ)</title>
	<link rel="stylesheet" href="css/style.css" type="text/css">
	<script src="javaScript/script.js" defer></script>
</head>

<body>
	<main>
		<!--ヘッダー-->
		<header id="header">
			<h1 class="brand-name">TORINO</h1>
			<div class="list-icon">
				<img src="img/heart.png" alt="お気に入り" class="list-img" name="お気に入り">
				<img src="img/bag.png" alt="カート" class="list-img" name="カート">
			</div>
		</header>
		<section id="top">
		</section>
		<!--メンズ-->
		<section id="mens">
			<div class="mens-image">
				<img src="img/mens.jpg" alt="メンズ画像1">
				<p>メンズコレクション</p>
				<div class="button"><a href="">もっと見る</a></div>
			</div>
		</section>
		<!--ウィメンズ-->
		<section id="womens">
			<div class="womens-image">
				<img src="img/womens.jpg" alt="ウィメンズ画像1">
				<p>ウィメンズコレクション</p>
				<div class="button"><a href="">もっと見る</a></div>
			</div>
		</section>
		<!--ベストセラー-->
		<section id="bestseller">
			<h2>BESTSELLER</h2>
			<div class="bestseller-image">
				<div class="item1">
					<div class="img-box">
						<img src="img/item.jpg" alt="カテゴリ画像1">
					</div>
					シャツ<br>
					¥20,000
					<input type="submit" name="シャツ" value="カートに入れる" class="button">
				</div>
				<div class="item2">
					<div class="img-box">
						<img src="img/item1.jpg" alt="カテゴリ画像2">
					</div>
					Tシャツ<br>
					¥10,000
					<input type="submit" name="Tシャツ" value="カートに入れる" class="button">
				</div>
				<div class="item3">
					<div class="img-box">
						<img src="img/item2.jpg" alt="カテゴリ画像3">
					</div>
					ショートTシャツ<br>
					¥15,000
					<input type="submit" name="ショートTシャツ" value="カートに入れる" class="button">
				</div>
				<div class="item4">
					<div class="img-box">
						<img src="img/item3.jpg" alt="カテゴリ画像2">
					</div>
					ポロシャツ<br>
					¥15,000
					<input type="submit" name="ポロシャツ" value="カートに入れる" class="button">
				</div>
				<div class="item5">
					<div class="img-box">
						<img src="img/item4.jpg" alt="カテゴリ画像3">
					</div>
					チノパンツ<br>
					¥22,000
					<input type="submit" name="チノパンツ" value="カートに入れる" class="button">
				</div>
				<div class="item6">
					<div class="img-box">
						<img src="img/item5.jpg" alt="カテゴリ画像3">
					</div>
					パンツ<br>
					¥20,000
					<input type="submit" name="パンツ" value="カートに入れる" class="button">
				</div>
			</div>
			<div class="button"><a href="#top">もっと見る</a></div>
		</section>
	</main>
	<footer>
		<div class="footer-text">
			<div class="footer-mens">
				<ul>
					<li class="category">メンズ</li>
					<li>アウター</li>
					<li>トップス</li>
					<li>パンツ</li>
				</ul>
			</div>
			<div class="footer-womens">
				<ul>
					<li class="category">ウィメンズ</li>
					<li>アウター</li>
					<li>トップス</li>
					<li>パンツ</li>
				</ul>
			</div>
			<div class="footer-customer">
				<ul>
					<li class="category">カスタマーサービス</li>
					<li>マイアカウント</li>
					<li>配送について</li>
					<li>返品と返金</li>
				</ul>
			</div>
		</div>
		<div class="copy">
			&copy; TORINO 2026
		</div>
	</footer>
</body>

</html>
